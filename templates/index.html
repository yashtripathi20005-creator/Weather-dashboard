<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." value="London">
                <button id="searchBtn">Search</button>
                <button id="geolocationBtn">📍 Use My Location</button>
            </div>
        </header>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <main>
            <!-- Current Weather -->
            <section id="currentWeather" class="current-weather" style="display: none;">
                <div class="weather-header">
                    <h2 id="cityName">City</h2>
                    <p id="weatherDescription">Description</p>
                </div>
                <div class="weather-main">
                    <div class="temperature">
                        <img id="weatherIcon" src="" alt="Weather icon">
                        <span id="tempC">0°C</span>
                        <span id="tempF">0°F</span>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="label">Feels Like</span>
                            <span id="feelsLike">0°C / 0°F</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Humidity</span>
                            <span id="humidity">0%</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Pressure</span>
                            <span id="pressure">0 hPa</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Wind Speed</span>
                            <span id="windSpeed">0 m/s</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Cloud Cover</span>
                            <span id="clouds">0%</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Visibility</span>
                            <span id="visibility">0 km</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast -->
            <section id="forecast" class="forecast" style="display: none;">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container">
                    <!-- Forecast cards will be inserted here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Data provided by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap</a></p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
